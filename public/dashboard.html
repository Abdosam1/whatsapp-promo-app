<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-key="pageTitleDashboard">لوحة التحكم - AutoSend Pro</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        :root {
            --primary-color: #25D366; --secondary-color: #128C7E; --dark-color: #075E54;
            --background-color: #f4f7f6; --card-background: #ffffff; --text-color: #1a1a1a;
            --light-gray: #e9ecef; --danger-color: #e74c3c; --blue-accent: #0d6efd;
            --shadow-sm: 0 4px 6px rgba(0, 0, 0, 0.05); --shadow-lg: 0 15px 30px rgba(0, 0, 0, 0.1);
            --border-radius-lg: 16px; --border-radius-md: 8px;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif; background-color: var(--background-color);
            color: var(--text-color); margin: 0; display: flex;
        }
        .sidebar {
            width: 260px; background: var(--card-background); border-inline-end: 1px solid var(--light-gray);
            height: 100vh; padding: 25px; display: flex; flex-direction: column; position: fixed;
        }
        .main-container {
            flex-grow: 1; padding: 30px 40px; margin-inline-start: 260px;
        }
        .sidebar-header { text-align: center; margin-bottom: 40px; }
        .sidebar-header h1 { font-size: 1.8em; color: var(--dark-color); margin: 0; }
        .sidebar-header h1 i { color: var(--primary-color); }
        
        .sidebar-menu { list-style: none; padding: 0; margin: 0; }
        .sidebar-menu li a {
            display: flex; align-items: center; gap: 15px; padding: 15px;
            text-decoration: none; color: #555; font-weight: 600; border-radius: var(--border-radius-md);
            transition: background-color 0.2s, color 0.2s;
        }
        .sidebar-menu li a:hover, .sidebar-menu li a.active {
            background-color: var(--primary-color); color: white;
        }
        .sidebar-footer { margin-top: auto; text-align: center; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .header-title h1 { font-size: 2.2em; margin: 0; }
        .header-title p { margin: 5px 0 0; color: #777; }
        
        .header-controls { display: flex; align-items: center; gap: 15px; }
        .language-switcher button {
            background: var(--card-background); border: 1px solid var(--light-gray);
            color: #555; padding: 8px 12px; border-radius: var(--border-radius-md); cursor: pointer;
            font-weight: 600; transition: all 0.2s ease;
        }
        .language-switcher button.active { background-color: var(--dark-color); color: white; border-color: var(--dark-color); }

        .main-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; }
        .card {
            background: var(--card-background); border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-sm); padding: 25px 30px; border: 1px solid var(--light-gray);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            opacity: 0; transform: translateY(30px); /* For animation */
        }
        .card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); }
        .card.full-width { grid-column: 1 / -1; }
        .card h2 {
            font-size: 1.3em; font-weight: 700; color: var(--dark-color); margin: 0 0 20px 0;
            display: flex; align-items: center; justify-content: space-between;
        }
        .card h2 i { color: var(--secondary-color); }
        
        .btn {
            padding: 12px 25px; font-size: 1em; font-weight: 700;
            border-radius: var(--border-radius-md); transition: all 0.3s ease;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-secondary { background-color: var(--dark-color); color: white; }
        
        label { text-align: start; }
        .logs-box { border: 1px solid var(--light-gray); }
        .promo img { border-radius: var(--border-radius-md); }
        .promo { border: 1px solid var(--light-gray); box-shadow: none; }
        .promo.selected { border-color: var(--primary-color); box-shadow: 0 0 15px rgba(37, 211, 102, 0.4); }
        
        #whatsapp-status-card { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 50vh; text-align: center; }
        #main-content { display: none; opacity: 0; }
        
    </style>
</head>
<body class="dashboard-page">
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TT65MB24"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    
    <aside class="sidebar">
        <div class="sidebar-header">
            <h1><i class="fab fa-whatsapp"></i> AutoSend Pro</h1>
        </div>
        <ul class="sidebar-menu">
            <li><a href="#" class="active"><i class="fas fa-tachometer-alt fa-fw"></i> <span data-key="menuDashboard">لوحة التحكم</span></a></li>
            <li><a href="#"><i class="fas fa-cog fa-fw"></i> <span data-key="menuSettings">الإعدادات</span></a></li>
            <li><a href="#"><i class="fas fa-question-circle fa-fw"></i> <span data-key="menuSupport">الدعم الفني</span></a></li>
        </ul>
        <div class="sidebar-footer">
            <div class="language-switcher">
                <button id="lang-ar" data-key="lang_ar"></button>
                <button id="lang-en" data-key="lang_en"></button>
            </div>
            <button id="logoutBtn" class="btn btn-danger" style="width: 100%; margin-top: 20px;">
                <i class="fas fa-sign-out-alt"></i> <span data-key="logoutBtn"></span>
            </button>
        </div>
    </aside>

    <main class="main-container">
        <header>
            <div class="header-title">
                <h1 data-key="dashHeaderTitle"></h1>
                <p data-key="dashHeaderSubtitle"></p>
            </div>
        </header>

        <div class="card full-width" id="whatsapp-status-card">
            <h2 data-key="dashCardStatusTitle"><i class="fas fa-sync-alt"></i></h2>
            <div id="whatsapp-status">
                <p id="status-message" style="font-size: 1.2em; font-weight: 600;" data-key="dashStatusMsg"></p>
                <canvas id="qrcode-canvas" style="display:none;"></canvas>
            </div>
        </div>

        <div id="main-content">
            <div class="main-grid">
                <!-- All your cards go here -->
                <div class="card">
                  <h2 style="display: flex; justify-content: space-between; align-items: center;">
                      <span><i class="fas fa-users"></i> <span data-key="dashCardClientsTitle"></span></span>
                      <button type="button" id="syncContactsBtn" class="btn btn-secondary" style="padding: 5px 10px; font-size: 0.8em;">
                          <i class="fas fa-sync-alt"></i> <span data-key="dashSyncBtn"></span>
                      </button>
                  </h2>
                  <div class="button-group">
                      <button type="button" id="sendSequentiallyClientsBtn" class="btn btn-primary"><i class="fas fa-tasks"></i> <span data-key="dashSendAllBtn"></span></button>
                      <button type="button" id="exportClientsBtn" class="btn btn-secondary">
                          <i class="fas fa-download"></i> <span data-key="dashExportBtn"></span>
                      </button>
                  </div>
                  <div id="clientsList" class="list-box"></div>
                </div>

                <div class="card">
                  <h2><i class="fas fa-file-import"></i> <span data-key="dashCardImportedTitle"></span></h2>
                  <div class="form-group" style="display:flex; gap: 10px; align-items: center;">
                      <input type="file" id="csvFileInput" accept=".csv" style="flex-grow: 1;" />
                      <button type="button" id="importCsvBtn" class="btn btn-secondary"><i class="fas fa-upload"></i> <span data-key="dashImportBtn"></span></button>
                  </div>
                  <div class="button-group">
                      <button type="button" id="sendSequentiallyImportedBtn" class="btn btn-primary"><i class="fas fa-tasks"></i> <span data-key="dashSendAllBtn"></span></button>
                      <button type="button" id="deleteAllImportedBtn" class="btn btn-danger"><i class="fas fa-trash-alt"></i> <span data-key="dashDeleteAllBtn"></span></button>
                  </div>
                  <div id="importedClientsList" class="list-box"></div>
                </div>

                <div class="card full-width">
                  <h2><i class="fas fa-tags"></i> <span data-key="dashCardPromosTitle"></span></h2>
                  <div id="promosList" class="promos-grid"></div>
                </div>
                
                <div class="card">
                  <h2><i class="fas fa-plus-circle"></i> <span data-key="dashCardAddPromoTitle"></span></h2>
                  <div class="form-group">
                    <label for="newPromoText" data-key="dashPromoTextLabel"></label>
                    <textarea id="newPromoText" rows="3" data-key-placeholder="dashPromoTextPlaceholder"></textarea>
                    <button type="button" id="generateSpintaxBtn" class="btn btn-secondary" style="width:100%; margin-top: 10px; background-color: #6c757d;">
                        <i class="fas fa-magic"></i> <span data-key="dashGenerateSpintaxBtn"></span>
                    </button>
                  </div>
                  <div class="form-group">
                    <label for="newPromoImage" data-key="dashPromoImageLabel"></label>
                    <input type="file" id="newPromoImage" accept="image/*" />
                  </div>
                  <button type="button" id="addNewPromoBtn" class="btn btn-primary" style="width:100%;"><i class="fas fa-plus"></i> <span data-key="dashAddPromoBtn"></span></button>
                </div>
                
                <div class="card">
                    <h2><i class="fas fa-robot"></i> <span data-key="dashCardChatbotTitle"></span></h2>
                    <div class="form-group" style="display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; padding-bottom: 15px;">
                        <label for="chatbotStatusToggle" style="margin-bottom: 0;" data-key="dashChatbotStatusLabel"></label>
                        <div class="toggle-switch">
                            <input type="checkbox" id="chatbotStatusToggle">
                            <label for="chatbotStatusToggle"></label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="chatbotPrompt" data-key="dashChatbotPromptLabel"></label>
                        <textarea id="chatbotPrompt" rows="6" data-key-placeholder="dashChatbotPromptPlaceholder"></textarea>
                    </div>
                    <button type="button" id="savePromptBtn" class="btn btn-primary" style="width:100%;">
                        <i class="fas fa-save"></i> <span data-key="dashSavePromptBtn"></span>
                    </button>
                </div>

                <div class="card full-width">
                  <h2><i class="fas fa-history"></i> <span data-key="dashCardLogsTitle"></span></h2>
                  <div id="logs" class="list-box logs-box"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <script src="dashboard.js"></script>
    <script src="language.js"></script>
    <script>
        // Script بسيط لإضافة الحركات
        document.addEventListener('DOMContentLoaded', () => {
            // حركة ظهور الشريط الجانبي والرأس
            gsap.from(".sidebar", { duration: 1, x: -260, ease: "power3.out" });
            gsap.from("header", { duration: 0.8, y: -50, opacity: 0, ease: "power3.out", delay: 0.3 });
            
            // حركة بطاقة الحالة
            gsap.from("#whatsapp-status-card", { duration: 0.8, y: 50, opacity: 0, ease: "power3.out", delay: 0.5 });
        });
    </script>
</body>
</html>
