<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-key="pageTitleDashboard">لوحة التحكم - نظام إرسال WhatsApp</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
    :root {
      --primary-color: #25D366; --secondary-color: #128C7E; --dark-color: #075E54;
      --background-color: #f0f2f5; --card-background: #ffffff; --text-color: #333;
      --light-gray: #e9e9e9; --danger-color: #e74c3c;
      --shadow: 0 4px 8px rgba(0, 0, 0, 0.1); --border-radius: 8px;
    }
    body { font-family: 'Cairo', sans-serif; background-color: var(--background-color); color: var(--text-color); margin: 0; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    header { position: relative; text-align: center; margin-bottom: 30px; }
    header h1 { color: var(--dark-color); font-size: 2.5em; }
    header h1 i { color: var(--primary-color); }
    header p { color: #666; font-size: 1.1em; }

    .header-controls { position: absolute; top: 10px; inset-inline-start: 10px; display: flex; gap: 10px; z-index: 10;}
    .language-switcher button {
        background: #fff; border: 1px solid #ddd; color: #555; padding: 5px 10px;
        border-radius: 5px; cursor: pointer;
    }
    .language-switcher button.active { background: var(--primary-color); border-color: var(--primary-color); color: white; }

    .main-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
    .card { background: var(--card-background); border-radius: var(--border-radius); box-shadow: var(--shadow); padding: 20px; transition: transform 0.2s ease-in-out; text-align: start; }
    .card:hover { transform: translateY(-5px); }
    .card.full-width { grid-column: 1 / -1; }
    .card h2 { font-size: 1.5em; color: var(--secondary-color); margin-top: 0; margin-bottom: 20px; border-bottom: 2px solid var(--light-gray); padding-bottom: 10px; }
    .card h2 i { margin-inline-end: 10px; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 20px; border: none; border-radius: var(--border-radius); font-family: 'Cairo', sans-serif; font-size: 1em; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
    .btn:disabled { background-color: #ccc; cursor: not-allowed; }
    .btn-primary { background-color: var(--primary-color); color: white; }
    .btn-secondary { background-color: var(--secondary-color); color: white; }
    .btn-danger { background-color: var(--danger-color); color: white; }
    .button-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: 600; }
    input, textarea, select { width: 100%; padding: 10px; border: 1px solid var(--light-gray); border-radius: var(--border-radius); box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    textarea { resize: vertical; }
    .list-box { background-color: #f9f9f9; border: 1px solid var(--light-gray); border-radius: var(--border-radius); padding: 15px; min-height: 150px; max-height: 250px; overflow-y: auto; }
    .logs-box { font-family: monospace; font-size: 0.9em; color: #555; text-align: start; }
    .promos-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
    .promo { display: flex; flex-direction: column; align-items: center; border: 2px solid transparent; border-radius: var(--border-radius); padding: 10px; background-color: #fff; text-align: center; transition: all 0.2s ease; box-shadow: var(--shadow); }
    .promo:hover { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.1); }
    .promo img { width: 90px; height: 90px; object-fit: cover; border-radius: 6px; margin-bottom: 10px; }
    .promo p { font-size: 0.9em; color: #555; margin: 0 0 10px 0; flex-grow: 1; min-height: 40px; }
    .promo .promo-buttons { display: flex; gap: 5px; width: 100%; }
    .promo .promo-buttons button { flex-grow: 1; padding: 5px 8px; font-size: 0.8em; border: none; color: white; cursor: pointer; border-radius: 5px; }
    .promo .promo-buttons .btn-select { background-color: var(--secondary-color); }
    .promo .promo-buttons .btn-delete { background-color: var(--danger-color); }
    .promo.selected { border-color: var(--primary-color); box-shadow: 0 0 10px rgba(37, 211, 102, 0.5); }
  </style>
</head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TT65MB24"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

  <div class="container">
    <header>
      <div class="header-controls">
          <div class="language-switcher">
              <button id="lang-ar" data-key="lang_ar"></button>
              <button id="lang-en" data-key="lang_en"></button>
          </div>
          <button id="logoutBtn" class="btn btn-danger">
              <i class="fas fa-sign-out-alt"></i> <span data-key="logoutBtn"></span>
          </button>
      </div>
      <h1><i class="fab fa-whatsapp"></i> <span data-key="dashHeaderTitle"></span></h1>
      <p data-key="dashHeaderSubtitle"></p>
    </header>

    <div class="card full-width" id="whatsapp-status-card">
        <h2><i class="fas fa-sync-alt"></i> <span data-key="dashCardStatusTitle"></span></h2>
        <div id="whatsapp-status" style="text-align: center; padding: 20px;">
            <p id="status-message" style="font-size: 1.2em; font-weight: 600;" data-key="dashStatusMsg"></p>
            <canvas id="qrcode-canvas" style="display:none;"></canvas>
        </div>
    </div>

    <div id="main-content" style="display:none;">
      <div class="main-grid">
        <div class="card">
          <h2><i class="fas fa-users"></i> <span data-key="dashCardClientsTitle"></span></h2>
          <div class="button-group">
              <button type="button" id="sendSequentiallyClientsBtn" class="btn btn-primary"><i class="fas fa-tasks"></i> <span data-key="dashSendAllBtn"></span></button>
              <!-- الزر الجديد مع دعم الترجمة -->
              <button type="button" id="exportClientsBtn" class="btn btn-secondary">
                  <i class="fas fa-download"></i> <span data-key="dashExportBtn"></span>
              </button>
          </div>
          <div id="clientsList" class="list-box"></div>
        </div>

        <div class="card">
          <h2><i class="fas fa-file-import"></i> <span data-key="dashCardImportedTitle"></span></h2>
          <div class="form-group" style="display:flex; gap: 10px; align-items: center;">
              <input type="file" id="csvFileInput" accept=".csv" style="flex-grow: 1;" />
              <button type="button" id="importCsvBtn" class="btn btn-secondary"><i class="fas fa-upload"></i> <span data-key="dashImportBtn"></span></button>
          </div>
          <div class="button-group">
              <button type="button" id="sendSequentiallyImportedBtn" class="btn btn-primary"><i class="fas fa-tasks"></i> <span data-key="dashSendAllBtn"></span></button>
              <button type="button" id="deleteAllImportedBtn" class="btn btn-danger"><i class="fas fa-trash-alt"></i> <span data-key="dashDeleteAllBtn"></span></button>
          </div>
          <div id="importedClientsList" class="list-box"></div>
        </div>

        <div class="card full-width">
          <h2><i class="fas fa-tags"></i> <span data-key="dashCardPromosTitle"></span></h2>
          <div id="promosList" class="promos-grid"></div>
        </div>
        
        <div class="card">
          <h2><i class="fas fa-plus-circle"></i> <span data-key="dashCardAddPromoTitle"></span></h2>
          <div class="form-group">
            <label for="newPromoText" data-key="dashPromoTextLabel"></label>
            <textarea id="newPromoText" rows="3" placeholder="..."></textarea>
          </div>
          <div class="form-group">
            <label for="newPromoImage" data-key="dashPromoImageLabel"></label>
            <input type="file" id="newPromoImage" accept="image/*" />
          </div>
          <button type="button" id="addNewPromoBtn" class="btn btn-primary" style="width:100%;"><i class="fas fa-plus"></i> <span data-key="dashAddPromoBtn"></span></button>
        </div>
        
        <div class="card">
          <h2><i class="fas fa-bullseye"></i> <span data-key="dashCardSingleSendTitle"></span></h2>
          <div class="form-group">
            <label for="phoneInput" data-key="dashPhoneLabel"></label>
            <input type="text" id="phoneInput" placeholder="212612345678" />
          </div>
          <button type="button" id="sendSelectedPromoBtn" class="btn btn-primary" style="width:100%;"><i class="fas fa-paper-plane"></i> <span data-key="dashSendSelectedBtn"></span></button>
        </div>

        <div class="card full-width">
          <h2><i class="fas fa-history"></i> <span data-key="dashCardLogsTitle"></span></h2>
          <div id="logs" class="list-box logs-box"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
  <script src="dashboard.js"></script>
  <script src="language.js"></script>
</body>
</html>
