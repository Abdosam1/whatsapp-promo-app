    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-key="pageTitleIndex">أداة إرسال واتساب الاحترافية</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        /* --- Modern Dark Theme Variables --- */
        :root {
            --bg-main: #0f111a;       
            --bg-card: rgba(30, 41, 59, 0.5);       
            --primary: #00d26a;       
            --primary-glow: rgba(0, 210, 106, 0.4);
            --secondary: #3b82f6;     
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.1);
        }

        /* --- General Body Styles --- */
        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            background-color: var(--bg-main);
            background-image: radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.15), transparent 50%);
            color: var(--text-main);
            text-align: center;
            overflow-x: hidden;
        }

        /* --- Hero Section --- */
        .hero {
            position: relative; 
            padding: 120px 20px 80px;
            background: transparent;
        }
        
        .hero h1 {
            font-size: 3.5em;
            font-weight: 900;
            margin: 0 0 20px;
            background: linear-gradient(to right, #fff, #a5f3fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.3));
        }
        .hero h1 i { -webkit-text-fill-color: var(--primary); }

        .hero p {
            font-size: 1.3em;
            max-width: 700px;
            margin: 10px auto 40px;
            color: var(--text-muted);
            line-height: 1.6;
        }
        
        /* --- Language Switcher --- */
        .language-switcher {
            position: absolute;
            top: 30px;
            inset-inline-start: 30px;
            z-index: 10;
        }
        .language-switcher button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            margin-inline-start: 5px;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            transition: 0.3s;
        }
        .language-switcher button:hover, .language-switcher button.active {
            background: rgba(0, 210, 106, 0.1);
            border-color: var(--primary);
            color: var(--primary);
        }

        /* --- Call-to-Action Buttons (Neon Style) --- */
        .cta-buttons a {
            text-decoration: none;
            padding: 14px 40px;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: 700;
            margin: 10px;
            transition: all 0.3s ease;
            display: inline-block;
            position: relative;
            overflow: hidden;
        }
        .btn-main { 
            background-color: var(--primary); 
            color: #000;
            box-shadow: 0 0 20px var(--primary-glow);
        }
        .btn-main:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 10px 40px var(--primary-glow); 
        }
        .btn-secondary { 
            background-color: transparent; 
            border: 1px solid var(--border);
            color: white; 
        }
        .btn-secondary:hover { 
            background-color: rgba(255,255,255,0.1); 
            border-color: white; 
        }

        /* --- Features Section --- */
        .features { padding: 80px 20px; max-width: 1200px; margin: auto; }
        .features h2, .pricing-section h2 { 
            font-size: 2.5em; color: white; margin-bottom: 60px; 
            text-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        
        .feature-card { 
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            padding: 40px; 
            border-radius: 16px; 
            transition: transform 0.3s ease; 
            text-align: start;
        }
        .feature-card:hover { 
            transform: translateY(-10px); 
            border-color: var(--primary);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }
        .feature-card .icon { 
            font-size: 2.5em; color: var(--primary); margin-bottom: 20px; 
            background: rgba(0, 210, 106, 0.1); width: 60px; height: 60px;
            display: flex; align-items: center; justify-content: center; border-radius: 12px;
        }
        .feature-card h3 { font-size: 1.4em; color: white; margin-bottom: 10px; }
        .feature-card p { color: var(--text-muted); line-height: 1.6; }
        
        /* --- Pricing Section --- */
        .pricing-section { padding: 80px 20px; }
        .pricing-container {
            display: flex; justify-content: center; align-items: stretch; flex-wrap: wrap; gap: 30px; max-width: 1200px; margin: 0 auto;
        }
        .pricing-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            flex: 1; min-width: 300px;
            display: flex; flex-direction: column;
            position: relative; text-align: start;
            transition: 0.3s;
        }
        .pricing-card.popular {
            border-color: var(--primary);
            background: rgba(0, 210, 106, 0.05);
            transform: scale(1.05);
            z-index: 2;
            box-shadow: 0 0 30px rgba(0, 210, 106, 0.1);
        }
        .popular-badge {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: #000; padding: 5px 20px;
            border-radius: 20px; font-size: 0.9em; font-weight: 700;
            box-shadow: 0 0 15px var(--primary-glow);
        }
        .card-title { font-size: 1.6em; font-weight: 700; color: white; margin-bottom: 10px; }
        .card-desc { color: var(--text-muted); margin-bottom: 30px; min-height: 50px; font-size: 0.95em; }
        .price-amount { font-size: 3em; font-weight: 900; color: white; }
        .price-amount span { font-size: 0.4em; font-weight: 600; color: var(--text-muted); }
        .price-note { color: var(--primary); font-weight: 600; margin-top: 5px; margin-bottom: 20px; font-size: 0.9em; }
        
        /* --- Footer --- */
        .site-footer { 
            background-color: #05060a; border-top: 1px solid var(--border);
            color: var(--text-muted); padding: 30px 0; font-size: 0.9em; width: 100%; margin-top: 50px;
        }
        .footer-links a { color: white; text-decoration: none; margin: 0 10px; transition: color 0.3s ease; }
        .footer-links a:hover { color: var(--primary); }
        .footer-links span { color: #444; }
        .footer-copyright { margin-top: 15px; font-size: 0.8em; color: #666; }

        /* --- Loading Animation Overlay --- */
        #transition-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-main);
            z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.5s ease;
        }
        #transition-overlay.active { opacity: 1; pointer-events: all; }
        
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

<!-- Loading Overlay -->
<div id="transition-overlay">
    <div class="spinner"></div>
</div>

    <div class="hero">
        <div class="language-switcher">
            <button id="lang-ar" data-key="lang_ar"></button>
            <button id="lang-en" data-key="lang_en"></button>
        </div>
        <h1><i class="fab fa-whatsapp"></i> <span data-key="heroTitle"></span></h1>
        <p data-key="heroSubtitle"></p>
        <div class="cta-buttons">
            <!-- Added class 'anim-link' for animation -->
            <a href="signup.html" class="btn-main anim-link" data-key="ctaStart"></a>
            <a href="login.html" class="btn-secondary anim-link" data-key="ctaLogin"></a>
        </div>
    </div>

    <div class="features">
        <h2 data-key="featuresTitle"></h2>
        <div class="features-grid">
            <div class="feature-card">
                <div class="icon"><i class="fas fa-rocket"></i></div>
                <h3 data-key="feature1Title"></h3>
                <p data-key="feature1Desc"></p>
            </div>
            <div class="feature-card">
                <div class="icon"><i class="fas fa-file-import"></i></div>
                <h3 data-key="feature2Title"></h3>
                <p data-key="feature2Desc"></p>
            </div>
            <div class="feature-card">
                <div class="icon"><i class="fas fa-shield-alt"></i></div>
                <h3 data-key="feature3Title"></h3>
                <p data-key="feature3Desc"></p>
            </div>
        </div>
    </div>

    <div class="pricing-section">
        <h2 data-key="pricingSectionTitle"></h2>
        <div class="pricing-container">
            <div class="pricing-card">
                <h3 class="card-title" data-key="planMonthlyTitle"></h3>
                <p class="card-desc" data-key="planMonthlyDesc"></p>
                <div class="price-amount">$5 <span>/ <span data-key="monthly"></span></span></div>
                <p class="price-note" style="visibility: hidden;">&nbsp;</p>
            </div>
            <div class="pricing-card popular">
                <div class="popular-badge" data-key="mostPopular"></div>
                <h3 class="card-title" data-key="planSemiTitle"></h3>
                <p class="card-desc" data-key="planSemiDesc"></p>
                <div class="price-amount">$20 <span>/ 6 <span data-key="monthly"></span></span></div>
                <p class="price-note" data-key="planSemiPricePerMonth"></p>
            </div>
            <div class="pricing-card">
                <h3 class="card-title" data-key="planYearlyTitle"></h3>
                <p class="card-desc" data-key="planYearlyDesc"></p>
                <div class="price-amount">$35 <span>/ <span data-key="billed_annually"></span></span></div>
                <p class="price-note" data-key="planYearlyPricePerMonth"></p>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-links">
            <a href="about.html" data-key="footerAbout"></a>
            <span>|</span>
            <a href="privacy.html" data-key="footerPrivacy"></a>
        </div>
        <div class="footer-copyright">
            &copy; <span id="copyright-year"></span> Autosend Pro. <span data-key="footerRights"></span>
        </div>
    </footer>

    <script>
        document.getElementById('copyright-year').textContent = new Date().getFullYear();

        // Animation Logic: Intercept clicks on login/signup buttons
        const links = document.querySelectorAll('.anim-link');
        const overlay = document.getElementById('transition-overlay');

        links.forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault(); // Prevent immediate navigation
                const href = this.getAttribute('href');

                // Show the loading overlay
                overlay.classList.add('active');

                // Wait 800ms (0.8 seconds) then navigate
                setTimeout(() => {
                    window.location.href = href;
                }, 800);
            });
        });
    </script>
    <script src="language.js"></script>
</body>
