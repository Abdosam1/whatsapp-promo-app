    <meta charset="UTF-8">

    <style>
        /* --- Google Font & Theme Variables --- */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        :root {
            --primary-color: #25D366;
            --secondary-color: #128C7E;
            --dark-color: #075E54;
            --background-color: #f0f2f5;
            --card-background: #ffffff;
            --shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            --border-radius: 8px;
        }

        /* --- General Body Styles --- */
        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            background-color: var(--background-color);
            text-align: center;
        }

        /* --- Hero Section (Top Banner) --- */
        .hero {
            position: relative; 
            background: var(--dark-color);
            background: linear-gradient(135deg, var(--dark-color) 0%, var(--secondary-color) 100%);
            color: white;
            padding: 80px 20px;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
            margin-bottom: -50px;
        }
        .hero h1 {
            font-size: 3.2em;
            font-weight: 900;
            margin: 0 0 10px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }
        .hero p {
            font-size: 1.3em;
            max-width: 600px;
            margin: 10px auto 30px;
            opacity: 0.9;
        }
        
        /* --- Language Switcher Styles --- */
        .language-switcher {
            position: absolute;
            top: 20px;
            inset-inline-start: 20px;
            z-index: 10;
        }
        .language-switcher button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid white;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            margin-inline-start: 5px;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
        }
        .language-switcher button.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }

        /* --- Call-to-Action Buttons --- */
        .cta-buttons a {
            text-decoration: none;
            color: white;
            padding: 14px 32px;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: 700;
            margin: 0 10px;
            transition: all 0.3s ease;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn-main { background-color: var(--primary-color); border: 2px solid var(--primary-color); }
        .btn-main:hover { background-color: #20c35b; transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.2); }
        .btn-secondary { background-color: transparent; border: 2px solid white; }
        .btn-secondary:hover { background-color: white; color: var(--dark-color); }

        /* --- Features Section --- */
        .features { padding: 100px 20px 50px; max-width: 1200px; margin: auto; }
        .features h2 { font-size: 2.8em; color: var(--dark-color); margin-bottom: 50px; }
        .features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .feature-card { 
            background-color: var(--card-background); 
            padding: 30px; 
            border-radius: var(--border-radius); 
            box-shadow: var(--shadow); 
            transition: transform 0.3s ease; 
            text-align: start;
        }
        .feature-card:hover { transform: translateY(-10px); }
        .feature-card .icon { font-size: 3em; color: var(--primary-color); margin-bottom: 20px; }
        .feature-card h3 { font-size: 1.5em; color: var(--secondary-color); margin-bottom: 10px; }
        .feature-card p { color: #555; line-height: 1.6; }
        
        /* --- CSS for Pricing Section --- */
        .pricing-section {
            background-color: var(--card-background);
            padding: 80px 20px;
        }
        .pricing-section h2 {
            font-size: 2.8em;
            color: var(--dark-color);
            margin-bottom: 50px;
        }
        .pricing-container {
            display: flex;
            justify-content: center;
            align-items: stretch;
            flex-wrap: wrap;
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .pricing-card {
            background: var(--background-color);
            border-radius: var(--border-radius);
            padding: 30px;
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            border: 2px solid transparent;
            position: relative;
            text-align: start;
        }
        .pricing-card.popular {
            border-color: var(--primary-color);
            transform: scale(1.05);
        }
        .popular-badge {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary-color);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 700;
        }
        .card-title { font-size: 1.8em; font-weight: 700; color: var(--secondary-color); margin-bottom: 10px; }
        .card-desc { color: #777; margin-bottom: 30px; min-height: 50px; }
        .price-amount { font-size: 3em; font-weight: 900; color: var(--dark-color); }
        .price-amount span { font-size: 0.5em; font-weight: 600; color: #555; }
        .price-note { color: #555; font-weight: 600; margin-top: -10px; margin-bottom: 30px; }
        
        /* --- Footer CSS --- */
        .site-footer { background-color: #333; color: #ccc; text-align: center; padding: 25px 0; font-size: 0.9em; width: 100%; }
        .footer-links a { color: #fff; text-decoration: none; margin: 0 10px; transition: color 0.3s ease; }
        .footer-links a:hover { color: var(--primary-color); }
        .footer-links span { color: #666; }
        .footer-copyright { margin-top: 15px; font-size: 0.8em; color: #aaa; }
    </style>
</head>
