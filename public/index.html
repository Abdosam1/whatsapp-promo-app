<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-key="pageTitleIndex">أداة إرسال واتساب الاحترافية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        /* --- Google Font & Theme Variables --- */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        :root {
            --primary-color: #25D366;
            --secondary-color: #128C7E;
            --dark-color: #075E54;
            --background-color: #f0f2f5;
            --card-background: #ffffff;
            --shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            --border-radius: 8px;
        }

        /* --- General Body Styles --- */
        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            background-color: var(--background-color);
            text-align: center;
        }

        /* --- Hero Section (Top Banner) --- */
        .hero {
            position: relative; 
            background: var(--dark-color);
            background: linear-gradient(135deg, var(--dark-color) 0%, var(--secondary-color) 100%);
            color: white;
            padding: 80px 20px;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
            margin-bottom: -50px;
        }
        .hero h1 {
            font-size: 3.2em;
            font-weight: 900;
            margin: 0 0 10px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }
        .hero p {
            font-size: 1.3em;
            max-width: 600px;
            margin: 10px auto 30px;
            opacity: 0.9;
        }
        
        /* --- ستايل أزرار اللغة (معدل لاستخدام الخصائص المنطقية) --- */
        .language-switcher {
            position: absolute;
            top: 20px;
            inset-inline-start: 20px; /* بديل 'left' ليدعم RTL/LTR */
            z-index: 10;
        }
        .language-switcher button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid white;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            margin-inline-start: 5px; /* بديل 'margin-left' */
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
        }
        .language-switcher button.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }

        /* --- Call-to-Action Buttons --- */
        .cta-buttons a {
            text-decoration: none;
            color: white;
            padding: 14px 32px;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: 700;
            margin: 0 10px;
            transition: all 0.3s ease;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn-main { background-color: var(--primary-color); border: 2px solid var(--primary-color); }
        .btn-main:hover { background-color: #20c35b; transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.2); }
        .btn-secondary { background-color: transparent; border: 2px solid white; }
        .btn-secondary:hover { background-color: white; color: var(--dark-color); }

        /* --- Features Section --- */
        .features { padding: 100px 20px 50px; max-width: 1200px; margin: auto; }
        .features h2 { font-size: 2.8em; color: var(--dark-color); margin-bottom: 50px; }
        .features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }

        /* --- Feature Card --- */
        .feature-card { 
            background-color: var(--card-background); 
            padding: 30px; 
            border-radius: var(--border-radius); 
            box-shadow: var(--shadow); 
            transition: transform 0.3s ease; 
            text-align: start; /* محاذاة النص للبداية (يمين في العربية، يسار في الإنجليزية) */
        }
        .feature-card:hover { transform: translateY(-10px); }
        .feature-card .icon { font-size: 3em; color: var(--primary-color); margin-bottom: 20px; }
        .feature-card h3 { font-size: 1.5em; color: var(--secondary-color); margin-bottom: 10px; }
        .feature-card p { color: #555; line-height: 1.6; }
        
        /* --- Footer CSS --- */
        .site-footer { background-color: #333; color: #ccc; text-align: center; padding: 25px 0; font-size: 0.9em; width: 100%; margin-top: 50px; }
        .footer-links a { color: #fff; text-decoration: none; margin: 0 10px; transition: color 0.3s ease; }
        .footer-links a:hover { color: var(--primary-color); }
        .footer-links span { color: #666; }
        .footer-copyright { margin-top: 15px; font-size: 0.8em; color: #aaa; }
    </style>
</head>
<body>

    <div class="hero">
        <div class="language-switcher">
            <button id="lang-ar" data-key="lang_ar"></button>
            <button id="lang-en" data-key="lang_en"></button>
        </div>

        <h1><i class="fab fa-whatsapp"></i> <span data-key="heroTitle"></span></h1>
        <p data-key="heroSubtitle"></p>
        <div class="cta-buttons">
            <a href="signup.html" class="btn-main" data-key="ctaStart"></a>
            <a href="login.html" class="btn-secondary" data-key="ctaLogin"></a>
        </div>
    </div>

    <div class="features">
        <h2 data-key="featuresTitle"></h2>
        <div class="features-grid">
            <div class="feature-card">
                <div class="icon"><i class="fas fa-rocket"></i></div>
                <h3 data-key="feature1Title"></h3>
                <p data-key="feature1Desc"></p>
            </div>
            <div class="feature-card">
                <div class="icon"><i class="fas fa-file-import"></i></div>
                <h3 data-key="feature2Title"></h3>
                <p data-key="feature2Desc"></p>
            </div>
            <div class="feature-card">
                <div class="icon"><i class="fas fa-shield-alt"></i></div>
                <h3 data-key="feature3Title"></h3>
                <p data-key="feature3Desc"></p>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-links">
            <a href="about.html" data-key="footerAbout"></a>
            <span>|</span>
            <a href="privacy.html" data-key="footerPrivacy"></a>
        </div>
        <div class="footer-copyright">
            &copy; <span id="copyright-year"></span> Autosend Pro. <span data-key="footerRights"></span>
        </div>
    </footer>

    <script>
        document.getElementById('copyright-year').textContent = new Date().getFullYear();
    </script>
    <script src="language.js"></script>
</body>
</html>
